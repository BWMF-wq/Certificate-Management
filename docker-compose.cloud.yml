services:
  backend:
    build: ./backend
    container_name: certpath-backend
    restart: unless-stopped
    network_mode: host
    environment:
      SERVER_PORT: 18081
      SERVER_ADDRESS: 127.0.0.1
      DB_URL: jdbc:mysql://127.0.0.1:13306/${MYSQL_DATABASE:-certificate_management}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-certificate_user}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PATH: /app/uploads
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://test.falshcode.xyz}
    volumes:
      - upload_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: /
        NGINX_CONFIG: nginx.cloud.conf
    container_name: certpath-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:6060:80"
    depends_on:
      - backend

volumes:
  upload_data:

services:
  mysql:
    image: mysql:8.4
    container_name: certificate-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-certificate_management}
      MYSQL_USER: ${MYSQL_USER:-certificate_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-certificate_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: certificate-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-certificate_management}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-certificate_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-certificate_password}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-key-at-least-32-characters}
      STORAGE_PATH: /app/uploads
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8080}
    ports:
      - "${BACKEND_BIND:-0.0.0.0}:${BACKEND_PORT:-8080}:8080"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: certificate-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  upload_data:

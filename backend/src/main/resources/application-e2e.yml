spring:
  datasource:
    url: jdbc:h2:mem:certificate_e2e;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: local-e2e-secret-key-at-least-32-characters-only
    expiration: 3600000
  storage:
    path: ./target/e2e-uploads
    max-file-size: 10485760
  cors:
    allowed-origins: http://127.0.0.1:5174,http://localhost:5174

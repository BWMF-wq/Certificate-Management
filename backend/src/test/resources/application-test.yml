spring:
  datasource:
    url: jdbc:h2:mem:certificate_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: integration-test-secret-key-at-least-32-characters
    expiration: 3600000
  storage:
    path: ./target/test-uploads
    max-file-size: 10485760
  cors:
    allowed-origins: http://localhost:5173

